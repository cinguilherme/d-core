## Local Development Containers for the core service

services: 

  postgres: 
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: core-service
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - 6379:6379
    volumes:
      - redis_data:/data

  valkey:
    image: valkey/valkey:7-alpine
    ports:
      - 6380:6379
    volumes:
      - valkey_data:/data

  zookeeper:
    image: zookeeper:3.9
    ports:
      - 2181:2181
    volumes:
      - zookeeper_data:/data
      - zookeeper_datalog:/datalog

  tile38:
    image: tile38/tile38:latest
    ports:
      - 9851:9851
    volumes:
      - tile38_data:/data
    environment:
      TILE38_PASSWORD: tile38
    command: tile38-server /data --password tile38

  nominatim:
    image: mediagis/nominatim:5.2
    ports:
      - 8088:8080
    environment:
      PBF_URL: ${DCORE_NOMINATIM_PBF_URL:-https://download.geofabrik.de/europe/monaco-latest.osm.pbf}
      REPLICATION_URL: ${DCORE_NOMINATIM_REPLICATION_URL:-https://download.geofabrik.de/europe/monaco-updates/}
      UPDATE_MODE: ${DCORE_NOMINATIM_UPDATE_MODE:-none}
      FREEZE: ${DCORE_NOMINATIM_FREEZE:-true}
      IMPORT_STYLE: ${DCORE_NOMINATIM_IMPORT_STYLE:-address}
      THREADS: ${DCORE_NOMINATIM_THREADS:-1}
      POSTGRES_SHARED_BUFFERS: ${DCORE_NOMINATIM_POSTGRES_SHARED_BUFFERS:-256MB}
      POSTGRES_MAINTENANCE_WORK_MEM: ${DCORE_NOMINATIM_POSTGRES_MAINTENANCE_WORK_MEM:-512MB}
      POSTGRES_AUTOVACUUM_WORK_MEM: ${DCORE_NOMINATIM_POSTGRES_AUTOVACUUM_WORK_MEM:-128MB}
      POSTGRES_EFFECTIVE_CACHE_SIZE: ${DCORE_NOMINATIM_POSTGRES_EFFECTIVE_CACHE_SIZE:-1024MB}
      NOMINATIM_PASSWORD: ${DCORE_NOMINATIM_PASSWORD:-nominatim}
    volumes:
      - nominatim_data:/var/lib/postgresql/16/main
    shm_size: 1gb

  osrm:
    image: ghcr.io/project-osrm/osrm-backend:v6.0.0
    ports:
      - 5001:5000
    environment:
      OSRM_PBF_URL: ${DCORE_OSRM_PBF_URL:-https://download.geofabrik.de/europe/monaco-latest.osm.pbf}
      OSRM_PROFILE: ${DCORE_OSRM_PROFILE:-car}
      OSRM_ALGORITHM: ${DCORE_OSRM_ALGORITHM:-mld}
    volumes:
      - osrm_data:/data
    command: >
      sh -ec '
        if [ ! -s /data/map.osm.pbf ]; then
          echo "Downloading OSM extract from $${OSRM_PBF_URL}";
          wget -q -O /data/map.osm.pbf "$${OSRM_PBF_URL}";
        fi;

        if [ ! -s /data/map.osrm ]; then
          echo "Preparing OSRM graph using profile $${OSRM_PROFILE}";
          osrm-extract -p "/opt/$${OSRM_PROFILE}.lua" /data/map.osm.pbf;
          if [ "$${OSRM_ALGORITHM}" = "ch" ]; then
            osrm-contract /data/map.osrm;
          else
            osrm-partition /data/map.osrm;
            osrm-customize /data/map.osrm;
          fi;
        fi;

        exec osrm-routed --algorithm "$${OSRM_ALGORITHM}" /data/map.osrm
      '

  valhalla:
    image: ghcr.io/valhalla/valhalla-scripted:latest
    ports:
      - 8002:8002
    environment:
      tile_urls: ${DCORE_VALHALLA_PBF_URL:-https://download.geofabrik.de/europe/monaco-latest.osm.pbf}
      server_threads: ${DCORE_VALHALLA_THREADS:-1}
      build_elevation: ${DCORE_VALHALLA_BUILD_ELEVATION:-False}
      build_admins: ${DCORE_VALHALLA_BUILD_ADMINS:-True}
      build_time_zones: ${DCORE_VALHALLA_BUILD_TIME_ZONES:-True}
    volumes:
      - valhalla_data:/custom_files

  tileserver:
    image: maptiler/tileserver-gl:latest
    ports:
      - 8089:8080
    volumes:
      - tiles_data:/data
    command: --port 8080 --file /data/${DCORE_TILESERVER_MBTILES:-monaco.mbtiles}
    restart: unless-stopped

  tilebuilder:
    image: ghcr.io/onthegomap/planetiler:latest
    profiles: ["tiles-build"]
    environment:
      JAVA_TOOL_OPTIONS: ${DCORE_TILEBUILDER_JAVA_TOOL_OPTIONS:--Xmx2g}
    volumes:
      - tiles_data:/data
    command: >
      --download
      --area=${DCORE_TILEBUILDER_AREA:-monaco}
      --download-dir=/data/sources
      --tmpdir=/data/tmp
      --minzoom=${DCORE_TILEBUILDER_MINZOOM:-0}
      --maxzoom=${DCORE_TILEBUILDER_MAXZOOM:-12}
      --render_maxzoom=${DCORE_TILEBUILDER_RENDER_MAXZOOM:-12}
      --output=/data/${DCORE_TILESERVER_MBTILES:-monaco.mbtiles}
      --force
    restart: "no"

  # open-street-map:
  #   image: overv/openstreetmap-tile-server
  #   ports:
  #     - 8080:8080
  #   volumes:
  #     - open-street-map_data:/data
  #   environment:
  #     UPDATES_ENABLED: enabled
  #     UPDATE_URL: https://download.geofabrik.de/europe/monaco-latest.osm.pbf
  #     TILE_DIR: /data
  #     TILE_STYLE: /data/style.yaml
  #     TILE_ZOOM: 12
  #     TILE_MIN_ZOOM: 1
  #     TILE_MAX_ZOOM: 12

  memcached:
    image: memcached:1.6-alpine
    ports:
      - 11211:11211
    volumes:
      - memcached_data:/data
    environment:
      MEMCACHED_MAX_ITEM_SIZE: 1024
    command: memcached -u memcached -m 64

  typesense:
    image: typesense/typesense:0.25.2
    ports:
      - 8108:8108
    volumes:
      - typesense_data:/data
    environment:
      TYPESENSE_DATA_DIR: /data
      TYPESENSE_API_KEY: typesense
    command: typesense-server --data-dir /data --api-key typesense

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - 15672:15672
      - 5672:5672
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  minio:
    image: minio/minio:latest
    ports:
      - 9000:9000
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    command: server /data --console-address ":9001"

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.4
    ports:
      - 8080:8080
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command: ["start-dev", "--import-realm"]
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./docker/keycloak/realm-d-core.json:/opt/keycloak/data/import/realm-d-core.json

  nats:
    image: nats:2.10-alpine
    ports:
      - 4222:4222
      - 8222:8222
    command: ["-js", "-sd", "/data", "-m", "8222"]
    volumes:
      - nats_data:/data

  sqs:
    image: roribio16/alpine-sqs
    ports:
      - 9324:9324
      - 9325:9325
    volumes:
      - /opt/alpine-sqs:/opt/custom

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    ports:
      - 9092:9092
      - 29092:29092
      - 9093:9093
    volumes:
      - kafka_data:/var/lib/kafka/data
    environment:
      # KRaft mode configuration (no Zookeeper)
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      # Listeners
      KAFKA_LISTENERS: PLAINTEXT://:9092,PLAINTEXT_HOST://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      # Topic configuration
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
      # Log retention
      KAFKA_LOG_RETENTION_BYTES: 1073741824
      KAFKA_LOG_RETENTION_MS: 86400000
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_SEGMENT_MS: 86400000

  kafka-data: # Second independent Kafka broker/controller (KRaft) forming its own cluster, used for multi-cluster testing and not related to the 'kafka' service.
    image: confluentinc/cp-kafka:7.6.1
    ports:
      - 9094:9094
      - 29094:29094
      - 9095:9095
    volumes:
      - kafka-data_data:/var/lib/kafka/data
    environment:
      # KRaft mode configuration (no Zookeeper)
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-data:9095
      CLUSTER_ID: random-cluster-id-data
      # Listeners
      KAFKA_LISTENERS: PLAINTEXT://:9094,PLAINTEXT_HOST://:29094,CONTROLLER://:9095
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-data:9094,PLAINTEXT_HOST://localhost:29094
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
      # Log retention
      KAFKA_LOG_RETENTION_BYTES: 1073741824
      KAFKA_LOG_RETENTION_MS: 86400000
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_SEGMENT_MS: 86400000

  xtdb:
    image: ghcr.io/xtdb/xtdb:latest
    ports:
      - "6432:5432"   # Postgres wire protocol
      - "9080:8080"   # health/metrics
    volumes:
      - xtdb_data:/var/lib/xtdb
    # optional, but nice to name it
    container_name: xtdb

volumes:
  postgres_data:
  redis_data:
  valkey_data:
  zookeeper_data:
  zookeeper_datalog:
  memcached_data:
  minio_data:
  typesense_data:
  nats_data:
  kafka_data:
  kafka-data_data:
  # datomic_data:
  xtdb_data:
  rabbitmq_data:
  tile38_data:
  keycloak_data:
  nominatim_data:
  osrm_data:
  valhalla_data:
  tiles_data:
  # open-street-map_data:
